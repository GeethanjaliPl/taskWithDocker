name: Docker Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build JAR with Maven
        run: mvn clean package

      - name: Validate JAR
        run: java -jar target/hello-world-1.0-SNAPSHOT.jar

      # - name: Upload JAR artifact
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: maven-jar
      #     path: target/*.jar
          
      # - name: Download JAR artifact
      #   uses: actions/download-artifact@v4
      #   with:
      #     name: maven-jar
      #     path: target

      - name: Login Docker
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Set version
        run: echo "TAG=v${{ github.run_number }}" >> $GITHUB_ENV
        
      - name: Build Docker Image via Compose
        run: docker compose -f docker/docker-compose.yml build

      # - name: Tag Docker Image
      #   run: |
      #     docker tag geethapl/hello-world-app:latest geethapl/hello-world-app:${{ env.TAG }}

      # - name: Push Docker Images
      #   run: |
      #    docker push geethapl/hello-world-app:latest
      #    docker push geethapl/hello-world-app:${{ env.TAG }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          region: ap-south-1

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Tag Image for ECR
        run: |
          ECR_REGISTRY=${{ steps.login-ecr.outputs.registry }}
          docker tag geethapl/hello-world-app:latest $ECR_REGISTRY/gee-ecr:${{ env.TAG }}

      - name: Push Image to ECR
        id: push-image
        run: |
          ECR_REGISTRY=${{ steps.login-ecr.outputs.registry }}
          IMAGE_URI=$ECR_REGISTRY/gee-ecr:${{ env.TAG }}
          docker push $IMAGE_URI
          echo "image=$IMAGE_URI" >> $GITHUB_OUTPUT

  deploy:
  needs: build
  runs-on: ubuntu-latest

  steps:
    - uses: actions/checkout@v4

    - name: Set up kubectl
      uses: azure/setup-kubectl@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
      aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
      aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      region: ap-south-1

    - name: Update kubeconfig for EKS
      run: |
        aws eks update-kubeconfig --region ap-south-1 --name demo-eks-cluster1

    - name: Update Image in Manifest
      run: |
        sed -i "s|IMAGE_PLACEHOLDER|hello-world-app:${{ env.TAG }}|g" docker/manifest.yml

    - name: Deploy to Kubernetes
      run: |
        kubectl apply -f docker/manifest.yml -n geetha

    - name: Verify Deployment
      run: |
        kubectl rollout status deployment/hello-world-app -n geetha


