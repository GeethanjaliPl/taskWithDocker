name: Docker Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build JAR with Maven
        run: mvn clean package

      - name: Validate JAR
        run: java -jar target/hello-world-1.0-SNAPSHOT.jar

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: maven-jar
          path: target/*.jar
          
      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: maven-jar
          path: target

      - name: Login Docker
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Set version
        run: echo "TAG=v${{ github.run_number }}" >> $GITHUB_ENV
        
      - name: Build Docker Image via Compose
        run: docker compose -f docker/docker-compose.yml build

      - name: Tag Docker Image
        run: |
          docker tag geethapl/hello-world-app:latest geethapl/hello-world-app:${{ env.TAG }}

      - name: Push Docker Images
        run: |
         docker push geethapl/hello-world-app:latest
         docker push geethapl/hello-world-app:${{ env.TAG }}


